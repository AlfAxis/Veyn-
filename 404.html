<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Veyné</title>
<link rel="icon" type="image/png" href="logo.png"><link rel="apple-touch-icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>


<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0808;--dark:#040302;--accent:#9b1c1c;--gold:#c8a070;--gold2:#b8905a;--text:#f2eee8;--text3:#cac4bc;--text4:#a09690;--border:#2c2820;}
html,body{height:100%;font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;gap:0;}
.nav-bar{position:fixed;top:0;left:0;right:0;background:var(--dark);height:62px;display:flex;align-items:center;justify-content:center;border-bottom:0.5px solid var(--border);z-index:10;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:8px;color:var(--text);text-decoration:none;font-weight:300;}
.nav-logo img{height:22px;width:auto;filter:invert(1);opacity:.9;vertical-align:middle;}
.num{font-family:'Cormorant Garamond',serif;font-size:clamp(80px,18vw,160px);font-weight:300;letter-spacing:12px;color:var(--border);line-height:1;animation:fadeIn .8s ease both;}
.rule{width:32px;height:0.5px;background:var(--gold2);margin:2rem auto;}
.title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,32px);font-weight:300;letter-spacing:5px;color:var(--text);animation:fadeIn .8s ease both .1s;opacity:0;}
.sub{font-size:11px;letter-spacing:2px;color:var(--text4);line-height:2;margin-top:1.2rem;animation:fadeIn .8s ease both .2s;opacity:0;}
.actions{display:flex;gap:1rem;margin-top:3rem;flex-wrap:wrap;justify-content:center;animation:fadeIn .8s ease both .3s;opacity:0;}
.btn{padding:.85rem 2rem;font-size:8.5px;letter-spacing:4px;text-transform:uppercase;border:0.5px solid;transition:all .3s;text-decoration:none;display:inline-flex;align-items:center;cursor:pointer;}
.btn-p{background:var(--text);color:var(--bg);border-color:var(--text);}.btn-p:hover{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.btn-g{background:transparent;color:var(--text3);border-color:var(--border);}.btn-g:hover{border-color:var(--text3);}
.quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(13px,2vw,16px);color:var(--text4);margin-top:4rem;letter-spacing:1px;line-height:2;animation:fadeIn .8s ease both .5s;opacity:0;}
</style>
</head>
<body>
<nav class="nav-bar">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="Veyné" onerror="this.style.display='none';this.nextSibling.style.display='inline';">
    <span style="display:none;">Veyné</span>
  </a>
</nav>
<div class="wrap" style="padding-top:62px;">
  <p class="num">404</p>
  <div class="rule"></div>
  <h1 class="title">Lost in the Realm</h1>
  <p class="sub">The page you seek does not exist in this domain.<br/>Perhaps the Warden moved it, or it never was.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-p">Return Home</a>
    <a href="men.html" class="btn btn-g">Browse Collection</a>
    <a href="contact.html" class="btn btn-g">Client Services</a>
  </div>
  <p class="quote">"The Hunt continues — even when the path is unclear."<br/><span style="font-style:normal;font-size:.85em;letter-spacing:3px;color:var(--border);">— Cealis Veyne</span></p>
</div>
</body>
</html>
